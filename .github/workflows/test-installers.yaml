name: Test Actions

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-installers:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ github.actor == 'dependabot[bot]' && fromJson('["ubuntu-latest"]') || fromJson('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
        tool: [ampel-bootstrap, ampel, bnd]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - if: matrix.tool == 'ampel-bootstrap'
        id: bootstrap
        uses: ./install/ampel-bootstrap
      - if: matrix.tool == 'ampel'
        uses: ./install/ampel
      - if: matrix.tool == 'bnd'
        uses: ./install/bnd

      - if: matrix.tool == 'ampel-bootstrap'
        name: Verify bootstrap binary runs
        shell: bash
        run: ${STEPS_BOOTSTRAP_OUTPUTS_AMPEL_PATH} version
        env:
          STEPS_BOOTSTRAP_OUTPUTS_AMPEL_PATH: ${{ steps.bootstrap.outputs.ampel-path }}

      - if: matrix.tool != 'ampel-bootstrap'
        name: Verify binary runs
        shell: bash
        run: ${{ matrix.tool }} --help

  test-download-and-verify:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ github.actor == 'dependabot[bot]' && fromJson('["ubuntu-latest"]') || fromJson('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download and verify snappy
        uses: ./install/download-and-verify
        with:
          tool: snappy
          version: v0.2.4
          attestation-file: snappy-v0.2.4.provenance.json

      - name: Verify snappy is on PATH
        shell: bash
        run: snappy version

  test-ampel-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download bnd binary as test subject
        shell: bash
        run: |
          curl -sSfL -o /tmp/bnd \
            "https://github.com/carabiner-dev/bnd/releases/download/v0.4.1/bnd-v0.4.1-linux-amd64"

      - name: Verify bnd with ampel/verify
        uses: ./ampel/verify
        with:
          subject: /tmp/bnd
          collector: https://github.com/carabiner-dev/bnd/releases/download/v0.4.1/attestations.jsonl
          policy: "git+https://github.com/carabiner-dev/policies#slsa/has-attestation.json"
          attest: "false"
