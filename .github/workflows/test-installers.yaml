name: Test Actions

on:
  pull_request:
    branches: [main]

jobs:
  test-installers:
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ github.actor == 'dependabot[bot]' && fromJson('["ubuntu-latest"]') || fromJson('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
        tool: [ampel, bnd]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - if: matrix.tool == 'ampel'
        uses: ./install/ampel
      - if: matrix.tool == 'bnd'
        uses: ./install/bnd

      - name: Verify binary runs
        shell: bash
        run: ${{ matrix.tool }} --help

  test-ampel-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download bnd binary as test subject
        shell: bash
        run: |
          curl -sSfL -o /tmp/bnd \
            "https://github.com/carabiner-dev/bnd/releases/download/v0.4.1/bnd-v0.4.1-linux-amd64"

      - name: Verify bnd with ampel/verify
        uses: ./ampel/verify
        with:
          subject: /tmp/bnd
          collector: https://github.com/carabiner-dev/bnd/releases/download/v0.4.1/attestations.jsonl
          policy: "git+https://github.com/carabiner-dev/policies#slsa/has-attestation.json"
          attest: "false"
