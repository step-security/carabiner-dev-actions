---
name: 'Verify Policy'
author: "step-security"
description: 'Verifies a subject against a policy'
branding:
  icon: 'award'
  color: 'green'
inputs:
  policy:
    description: Don't attempt to find and apply security policies
    required: true
  subject:
    description: 'Path to a file or hash (algo:value) to use as verification subject'
    required: true
  collector:
    description: 'Collector to load to read attestations'
    required: true
  attest:
    description: 'Attest the policy evaluation results'
    required: false
    default: "true"
  attest-format:
    description: 'Format of the results attestation'
    required: false
    default: "ampel"
  results-path:
    description: "Path to store the results attestation"
    required: false
    default: "ampel.intoto.json"
  push-attestation:
    description: 'Pushes the attestation to the GitHub attestations store'
    required: false
    default: "false"
  attestation:
    description: 'Comma separated list of attestations to ingest'
    required: false
    default: ""
  signer:
    description: 'Comma separated list of signer identity slugs'
    required: false
    default: ""
  key:
    description: 'Path to a key file to use for verification'
    required: false
    default: ""
  keydata:
    description: 'Raw key material to use for verification'
    required: false
    default: ""
  context:
    description: 'Contextual values to pass to the policy (e.g. "key=value,key2=value2")'
    required: false
    default: ""
  fail:
    description: 'Fail the workflow if the policy fails'
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Subscription check
      env:
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        # validate subscription status
        UPSTREAM="carabiner-dev/actions"
        ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
        DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

        echo ""
        echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
        echo "Secure drop-in replacement for $UPSTREAM"
        if [ "$REPO_PRIVATE" = "false" ]; then
          echo -e "\033[32m✓ Free for public repositories\033[0m"
        fi
        echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
        echo ""

        if [ "$REPO_PRIVATE" != "false" ]; then
          SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

          if [ "$SERVER_URL" != "https://github.com" ]; then
            BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
          else
            BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
          fi

          API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

          RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Timeout or API not reachable. Continuing to next step."
          elif [ "$RESPONSE" = "403" ]; then
            echo -e "::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m"
            echo -e "::error::\033[31mLearn how to enable a subscription: $DOCS_URL\033[0m"
            exit 1
          fi
        fi
      shell: bash

    - uses: step-security/carabiner-dev-actions/install/ampel@a7f7760ddaf7b711216af996d139d4f63c1eb248 # v1.1.6
      name: 🔴🟡🟢 AMPEL Setup
      id: install

    - id: attest-check
      shell: bash
      env:
        INPUT_ATTEST: ${{ inputs.attest }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        ATTEST="${INPUT_ATTEST}"
        if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
          echo "::notice::Attestation disabled: no token available for workflow_dispatch events"
          ATTEST="false"
        fi
        echo "attest=${ATTEST}" >> "$GITHUB_OUTPUT"

    - id: verify
      shell: bash
      env:
        INPUT_CONTEXT: ${{ inputs.context }}
        INPUT_KEY: ${{ inputs.key }}
        INPUT_KEYDATA: ${{ inputs.keydata }}
        INPUT_SUBJECT: ${{ inputs.subject }}
        INPUT_COLLECTOR: ${{ inputs.collector }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_FAIL: ${{ inputs.fail }}
        INPUT_ATTEST_RESULTS: ${{ steps.attest-check.outputs.attest }}
        INPUT_ATTEST_FORMAT: ${{ inputs.attest-format }}
        INPUT_RESULTS_PATH: ${{ inputs.results-path }}
        INPUT_ATTESTATION: ${{ inputs.attestation }}
        INPUT_SIGNER: ${{ inputs.signer }}
      run: |
        ARGS=()

        if [ -n "${INPUT_CONTEXT}" ]; then
          ARGS+=(--context "${INPUT_CONTEXT}")
        fi

        if [ -n "${INPUT_KEY}" ]; then
          ARGS+=(--key="${INPUT_KEY}")
        fi

        if [ -n "${INPUT_KEYDATA}" ]; then
          KEYDATA_FILE=$(mktemp)
          printf '%s\n' "${INPUT_KEYDATA}" > "${KEYDATA_FILE}"
          ARGS+=(--key="${KEYDATA_FILE}")
        fi

        ampel verify \
          --subject="${INPUT_SUBJECT}" \
          --collector="${INPUT_COLLECTOR}" \
          --policy="${INPUT_POLICY}" \
          --exit-code="${INPUT_FAIL}" \
          --attest-results="${INPUT_ATTEST_RESULTS}" \
          --attest-format="${INPUT_ATTEST_FORMAT}" \
          --results-path="${INPUT_RESULTS_PATH}" \
          --attestation="${INPUT_ATTESTATION}" \
          --signer="${INPUT_SIGNER}" \
          "${ARGS[@]}" \
          --format="html" >> "$GITHUB_STEP_SUMMARY"

        if [ -n "${KEYDATA_FILE:-}" ]; then
          rm -f "${KEYDATA_FILE}"
        fi

    - if: ${{ steps.attest-check.outputs.attest == 'true' }}
      name: Setup bnd
      uses: step-security/carabiner-dev-actions/install/bnd@a7f7760ddaf7b711216af996d139d4f63c1eb248 # v1.1.6

    - if: ${{ steps.attest-check.outputs.attest == 'true' }}
      name: sign-ampel-results
      shell: bash
      env:
        INPUT_RESULTS_PATH: ${{ inputs.results-path }}
      run: |
        mv "${INPUT_RESULTS_PATH}" "${INPUT_RESULTS_PATH}.tmp"
        bnd statement "${INPUT_RESULTS_PATH}.tmp" >> "${INPUT_RESULTS_PATH}"

    - if: ${{ steps.attest-check.outputs.attest == 'true' && inputs.push-attestation == 'true' }}
      name: Push attestation to artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ampel.intoto.json
        path: ${{ inputs.results-path }}
