name: Download and verify Carabiner binary
author: step-security
description: >
  Downloads a Carabiner binary from GitHub releases and optionally verifies
  it using a bootstrapped ampel trust anchor against SLSA provenance.
branding:
  icon: 'download-cloud'
  color: 'green'
inputs:
  tool:
    description: 'Name of the binary to install'
    required: true
  version:
    description: 'Release tag to download (e.g. v1.0.0)'
    required: true
  install-dir:
    description: 'Path to install the binary'
    required: false
    default: '$HOME/.carabiner'
  repo:
    description: 'GitHub repository under carabiner-dev (defaults to tool name)'
    required: false
    default: ''
  verify:
    description: 'Verify the binary with ampel against SLSA provenance'
    required: false
    default: 'true'
  attestation-file:
    description: 'Name of the attestation file in the release'
    required: false
    default: 'attestations.jsonl'
  policy:
    description: >
      Ampel policy locator (VCS locator or path) used by `ampel verify`.
      Defaults to a pinned revision of the carabiner-dev policies repo's
      slsa-build-point policy.
    required: false
    default: 'git+https://github.com/carabiner-dev/policies@eed2d09ac2a7f8f5238a24b30492e378d8d77ad3#slsa/slsa-build-point.json'
  context:
    description: >
      Newline-separated context values passed to `ampel verify` as `-x KEY:VALUE`.
      When empty, the action injects `buildPoint:git+ssh://github.com/carabiner-dev/<repo>`
      derived from the download location, matching the URI scheme used in the
      `resolvedDependencies` of carabiner-dev SLSA provenances.
    required: false
    default: ''
  signers:
    description: >
      Newline-separated signer identity specs passed to `ampel verify` as `--signer SPEC`.
      When empty, the action injects a sigstore regexp spec pinned to the
      `<repo>/.github/workflows/release.yaml` workflow under carabiner-dev,
      with the tag left as a regex wildcard.
    required: false
    default: ''
runs:
  using: "composite"
  steps:
      - name: Subscription check
        env:
          REPO_PRIVATE: ${{ github.event.repository.private }}
        run: |
          # validate subscription status
          UPSTREAM="carabiner-dev/actions"
          ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
          DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

          echo ""
          echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
          echo "Secure drop-in replacement for $UPSTREAM"
          if [ "$REPO_PRIVATE" = "false" ]; then
            echo -e "\033[32m✓ Free for public repositories\033[0m"
          fi
          echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
          echo ""

          if [ "$REPO_PRIVATE" != "false" ]; then
            SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

            if [ "$SERVER_URL" != "https://github.com" ]; then
              BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
            else
              BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
            fi

            API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

            RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

            if [ $CURL_EXIT_CODE -ne 0 ]; then
              echo "Timeout or API not reachable. Continuing to next step."
            elif [ "$RESPONSE" = "403" ]; then
              echo -e "::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m"
              echo -e "::error::\033[31mLearn how to enable a subscription: $DOCS_URL\033[0m"
              exit 1
            fi
          fi
        shell: bash

      - name: Bootstrap trusted ampel
        if: inputs.verify == 'true'
        uses: step-security/carabiner-dev-actions/install/ampel-bootstrap@auto-cherry-pick
        id: bootstrap

      - name: Detect platform
        id: platform
        shell: bash
        run: |
          OS="${{ runner.os }}"
          ARCH="${{ runner.arch }}"

          case "$OS" in
            Linux)  os="linux" ;;
            macOS)  os="darwin" ;;
            Windows) os="windows" ;;
            *) echo "::error::Unsupported OS: $OS"; exit 1 ;;
          esac

          case "$ARCH" in
            X64)   arch="amd64" ;;
            ARM64) arch="arm64" ;;
            *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
          esac

          ext=""
          if [ "$os" = "windows" ]; then
            ext=".exe"
          fi

          REPO="${INPUTS_REPO}"
          if [ -z "$REPO" ]; then
            REPO="${INPUTS_TOOL}"
          fi

          echo "filename=${INPUTS_TOOL}-${INPUTS_VERSION}-${os}-${arch}${ext}" >> "$GITHUB_OUTPUT"
          echo "ext=${ext}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
        env:
          INPUTS_REPO: ${{ inputs.repo }}
          INPUTS_TOOL: ${{ inputs.tool }}
          INPUTS_VERSION: ${{ inputs.version }}

      - name: Install ${{ inputs.tool }}
        shell: bash
        run: |
          mkdir -p ${INPUTS_INSTALL_DIR}/bin || :
          curl -sSfL -o ${INPUTS_INSTALL_DIR}/bin/${INPUTS_TOOL}${STEPS_PLATFORM_OUTPUTS_EXT} \
            "https://github.com/carabiner-dev/${STEPS_PLATFORM_OUTPUTS_REPO}/releases/download/${INPUTS_VERSION}/${STEPS_PLATFORM_OUTPUTS_FILENAME}"
          chmod 0755 ${INPUTS_INSTALL_DIR}/bin/${INPUTS_TOOL}${STEPS_PLATFORM_OUTPUTS_EXT}
        env:
          INPUTS_INSTALL_DIR: ${{ inputs.install-dir }}
          INPUTS_TOOL: ${{ inputs.tool }}
          STEPS_PLATFORM_OUTPUTS_EXT: ${{ steps.platform.outputs.ext }}
          STEPS_PLATFORM_OUTPUTS_REPO: ${{ steps.platform.outputs.repo }}
          INPUTS_VERSION: ${{ inputs.version }}
          STEPS_PLATFORM_OUTPUTS_FILENAME: ${{ steps.platform.outputs.filename }}

      - name: Verify ${{ inputs.tool }} binary
        if: inputs.verify == 'true'
        shell: bash
        env:
          CONTEXT_INPUT: ${{ inputs.context }}
          SIGNERS_INPUT: ${{ inputs.signers }}
          DEFAULT_BUILD_POINT: git+ssh://github.com/carabiner-dev/${{ steps.platform.outputs.repo }}
          DEFAULT_SIGNER: 'sigstore(regexp)::https://token\.actions\.githubusercontent\.com::https://github\.com/carabiner-dev/${{ steps.platform.outputs.repo }}/\.github/workflows/release\.yaml@refs/tags/[^/]+'
          INPUTS_TOOL: ${{ inputs.tool }}
          INPUTS_VERSION: ${{ inputs.version }}
          INPUTS_INSTALL_DIR: ${{ inputs.install-dir }}
          STEPS_PLATFORM_OUTPUTS_EXT: ${{ steps.platform.outputs.ext }}
          STEPS_PLATFORM_OUTPUTS_REPO: ${{ steps.platform.outputs.repo }}
          INPUTS_ATTESTATION_FILE: ${{ inputs.attestation-file }}
          INPUTS_POLICY: ${{ inputs.policy }}
          STEPS_BOOTSTRAP_OUTPUTS_AMPEL_PATH: ${{ steps.bootstrap.outputs.ampel-path }}
        run: |
          echo "::group::Verify ${INPUTS_TOOL} ${INPUTS_VERSION}"

          args=(verify)
          args+=(--subject="${INPUTS_INSTALL_DIR}/bin/${INPUTS_TOOL}${STEPS_PLATFORM_OUTPUTS_EXT}")
          args+=(--collector="https://github.com/carabiner-dev/${STEPS_PLATFORM_OUTPUTS_REPO}/releases/download/${INPUTS_VERSION}/${INPUTS_ATTESTATION_FILE}")
          args+=(--policy="${INPUTS_POLICY}")

          if [ -n "$CONTEXT_INPUT" ]; then
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              args+=(-x "$line")
            done <<< "$CONTEXT_INPUT"
          else
            args+=(-x "buildPoint:$DEFAULT_BUILD_POINT")
          fi

          if [ -n "$SIGNERS_INPUT" ]; then
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              args+=(--signer "$line")
            done <<< "$SIGNERS_INPUT"
          else
            args+=(--signer "$DEFAULT_SIGNER")
          fi

          "${STEPS_BOOTSTRAP_OUTPUTS_AMPEL_PATH}" "${args[@]}"
          echo "::endgroup::"

      - if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
        run: echo "${INPUTS_INSTALL_DIR}/bin" >> $GITHUB_PATH
        shell: bash
        env:
          INPUTS_INSTALL_DIR: ${{ inputs.install-dir }}
      - if: ${{ runner.os == 'Windows' }}
        run: echo "$env:INPUTS_INSTALL_DIR/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh
        env:
          INPUTS_INSTALL_DIR: ${{ inputs.install-dir }}

      - shell: bash
        run: ${INPUTS_TOOL} version
        env:
          INPUTS_TOOL: ${{ inputs.tool }}
